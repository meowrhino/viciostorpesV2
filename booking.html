  <meta name="twitter:card" content="summary_large_image">

  <link rel="icon" type="image/png" href="data/favicon.png">

  <link rel="stylesheet" href="css/booking.css">
  <link rel="stylesheet" href="css/navigation.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sofia+Sans+Extra+Condensed:wght@400;600;900&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Fondo fijo -->
  <div class="booking-bg"></div>

  <!-- Formulario de contacto -->
  <main class="booking-container">
    <form class="booking-form" action="https://formsubmit.co/vicios.torpes@gmail.com" method="POST" enctype="multipart/form-data">
      <!-- Formsubmit config -->
      <input type="hidden" name="_subject" value="New booking — ViciosTorpes">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_next" value="https://viciostorpes.com/booking.html?sent=1">
      <input type="text" name="_honey" style="display:none">

      <!-- Name -->
      <div class="form-group">
        <label for="name" class="form-label">Name *</label>
        <input
          type="text"
          id="name"
          name="name"
          class="form-input"
          required
          placeholder="Your name"
        >
      </div>

      <!-- Email -->
      <div class="form-group">
        <label for="email" class="form-label">Email *</label>
        <input
          type="email"
          id="email"
          name="email"
          class="form-input"
          required
          autocomplete="email"
          inputmode="email"
          pattern="[^@\s]+@[^@\s]+\.[^@\s]+"
          placeholder="you@email.com"
        >
      </div>

      <!-- Instagram username (optional) -->
      <div class="form-group">
        <label for="instagram" class="form-label">Instagram (optional)</label>
        <input
          type="text"
          id="instagram"
          name="instagram"
          class="form-input"
          autocomplete="username"
          inputmode="text"
          pattern="^@?[A-Za-z0-9._]{1,30}$"
          placeholder="@yourhandle"
        >
      </div>

      <!-- Location -->
      <div class="form-group">
        <label for="location" class="form-label">Location *</label>
        <input
          type="text"
          id="location"
          name="location"
          class="form-input"
          required
          placeholder="Barcelona, Madrid, etc."
        >
      </div>

      <!-- Description -->
      <div class="form-group">
        <label for="description" class="form-label">Description *</label>
        <textarea
          id="description"
          name="description"
          class="form-textarea"
          rows="6"
          required
          placeholder="Tell me what you have in mind..."
        ></textarea>
      </div>

      <!-- Reference images -->
      <div class="form-group">
        <label for="attachment" class="form-label">Reference images</label>
        <input
          type="file"
          id="attachment"
          name="attachment"
          class="form-input form-file"
          accept="image/*"
          multiple
        >
        <p class="form-hint">You can add them in multiple batches. Click ✕ to remove one. Total size up to 9 MB.</p>
        <ul id="attachment-previews" class="attachment-previews" aria-live="polite"></ul>
      </div>

      <!-- Submit -->
      <button type="submit" class="form-submit">
        Send
      </button>
    </form>

    <!-- Firma -->
    <footer class="booking-footer">
      <p>web:meowrhino</p>
    </footer>
  </main>

  <!-- Contenedor de navegación posicional -->
  <div class="nav-container">
    <!-- Booking está abajo, entonces home está arriba -->
    <a href="index.html" class="nav-btn pos-top">home</a>
  </div>

  <script src="js/data-loader.js"></script>
  <script src="js/booking.js"></script>
  <script src="js/transitions.js"></script>
</body>
</html>
